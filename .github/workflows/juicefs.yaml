name: Build JuiceFS FDB

on:
  workflow_dispatch:
    inputs:
      juicefs_ref:
        description: "JuiceFS git branch, tag, or commit SHA"
        required: false
        default: "main"
        type: string
      platforms:
        description: "Comma-separated platforms"
        required: false
        default: "linux/amd64"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push juicefs.fdb
        uses: docker/build-push-action@v6
        with:
          context: ./juicefs
          file: ./juicefs/Dockerfile
          push: true
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          tags: |
            shaowenchen/demo:juicefs-fdb-7.4.6
            registry.cn-beijing.aliyuncs.com/opshub/shaowenchen-demo:juicefs-fdb-7.4.6
          build-args: |
            JUICEFS_REPO_REF=${{ github.event.inputs.juicefs_ref || 'main' }}
            FDB_VERSION=7.4.6

      - name: Summary
        env:
          PLATFORMS: ${{ github.event.inputs.platforms || 'linux/amd64' }}
        run: |
          {
            echo "### JuiceFS FDB build"
            echo ""
            echo "- DockerHub: \`shaowenchen/demo:juicefs-fdb-7.4.6\`"
            echo "- ACR: \`registry.cn-beijing.aliyuncs.com/opshub/shaowenchen-demo:juicefs-fdb-7.4.6\`"
            echo "- Makefile target: \`make juicefs.fdb\`"
            echo "- FoundationDB client: \`7.4.6\`"
            echo "- Binary path in image: \`/opt/juicefs/bin/juicefs\`"
            echo "- Platforms: \`${PLATFORMS}\`"
          } >> "$GITHUB_STEP_SUMMARY"
