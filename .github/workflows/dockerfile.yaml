name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dockerfile_path:
        description: "Path to the Dockerfile"
        required: true
        default: "wan-video/2.2.Dockerfile"
        type: string
      image_name:
        description: "DockerHub image name and tag. Uses the Dockerfile first line when empty."
        required: false
        default: ""
        type: string
      push_acr:
        description: "Push to Alibaba Cloud Container Registry"
        required: false
        default: false
        type: boolean
      acr_image_name:
        description: "ACR image name and tag. Derived from image_name when empty."
        required: false
        default: ""
        type: string
      platforms:
        description: "Comma-separated platforms, e.g. linux/amd64,linux/arm64"
        required: false
        default: "linux/amd64"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ACR
        if: ${{ github.event.inputs.push_acr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: image
        env:
          DOCKERFILE_PATH: ${{ github.event.inputs.dockerfile_path || 'wan-video/2.2.Dockerfile' }}
          IMAGE_NAME: ${{ github.event.inputs.image_name }}
          PUSH_ACR: ${{ github.event.inputs.push_acr || 'false' }}
          ACR_IMAGE_NAME: ${{ github.event.inputs.acr_image_name }}
        run: |
          build_context="$(dirname "$DOCKERFILE_PATH")"
          image="${IMAGE_NAME:-$(sed -n '1s/^# *//p' "$DOCKERFILE_PATH")}"
          repository="${image%%:*}"
          tag="${image#*:}"

          if [ -z "$repository" ] || [ -z "$tag" ] || [ "$repository" = "$tag" ]; then
            echo "Image name must be 'repository/name:tag', either from workflow input or the first Dockerfile line." >&2
            exit 1
          fi

          dockerhub_image="$image"
          acr_source_image="${image#docker.io/}"
          acr_image="${ACR_IMAGE_NAME:-registry.cn-beijing.aliyuncs.com/${acr_source_image}}"

          {
            echo "tags<<EOF"
            echo "$dockerhub_image"
            if [ "$PUSH_ACR" = "true" ]; then
              echo "$acr_image"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "context=${build_context}" >> "$GITHUB_OUTPUT"
          echo "file=${DOCKERFILE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.image.outputs.context }}
          file: ${{ steps.image.outputs.file }}
          push: true
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          tags: ${{ steps.image.outputs.tags }}
